name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [ '1.21', '1.22', '1.23', '1.24', '1.25', '1.26' ]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Test
      run: go test ./... -v
